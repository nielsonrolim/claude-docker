# Increase history buffer size
set-option -g history-limit 100000

# Use vi keys in copy mode
setw -g mode-keys vi

# Change prefix do a
#set-option -g prefix C-a
#unbind-key C-a
#bind-key C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Shift arrow keys to switch panes
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Alt arrow to switch windows
bind -n M-Left previous-window
bind -n M-Right next-window

# Swap windows (Option+i/o, matching Zellij)
bind -n M-i swap-window -d -t -1
bind -n M-o swap-window -d -t +1

# Jump directly to a window with Alt+1..9
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Mouse mode
setw -g mouse on

# Set easier window split keys
bind-key v split-window -v -c "#{pane_current_path}"
bind-key h split-window -h -c "#{pane_current_path}"

# Easy config reload
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# Sync pannels
bind-key y setw synchronize-panes

# Session management
bind-key N command-prompt -p "New session name:" "new-session -s '%%'"
bind-key R command-prompt -I "#S" -p "Rename session to:" "rename-session '%%'"
bind-key X confirm-before -p "Kill session #S? (y/n)" kill-session

# Colors
#set -g default-terminal "screen-256color"
#set -g default-terminal "tmux-256color"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"

# Auto-save sessions every 15 minutes and restore on startup
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Clipboard — use OSC 52 via Kitty (no external wl-copy process)
set -g set-clipboard on
bind-key -T copy-mode-vi y                 send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Search
# bind -n M-F copy-mode \; command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""
# bind -n M-f copy-mode \; command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
# Inside copy-mode use vi defaults: / ? n N
bind-key f copy-mode \; send-keys "/"
bind-key F copy-mode \; send-keys "?"

# Catppuccin - START

# Configure the catppuccin plugin (options must be set BEFORE running it)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Set status bar to the top
set-option -g status-position top

# Set status bar backgroung color
# set-option -g status-style "bg=black"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_uptime}"
# Catppuccin - END

# Plugins
# set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# set -g @plugin 'tmux-plugins/tpm'
# run '~/.tmux/plugins/tpm/tpm'

# Initialize tpack (keep this line at the very bottom of tmux.conf)
run 'tpack init'
